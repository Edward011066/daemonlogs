services:
  postgres:
    image: postgres:16-alpine
    container_name: daemonlogs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: daemonlogs-api
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    command:
      - sh
      - -c
      - |
        PASS=$$(node -e 'process.stdout.write(encodeURIComponent(process.env.POSTGRES_PASSWORD))')
        USER=$$(node -e 'process.stdout.write(encodeURIComponent(process.env.POSTGRES_USER))')
        DB=$${POSTGRES_DB:-daemonlogs_db}
        export DATABASE_URL="postgresql://$$USER:$$PASS@postgres:5432/$$DB"
        npx prisma migrate deploy
        node dist/server.js

  token-validator:
    build: .
    container_name: daemonlogs-token-validator
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        PASS=$$(node -e 'process.stdout.write(encodeURIComponent(process.env.POSTGRES_PASSWORD))')
        USER=$$(node -e 'process.stdout.write(encodeURIComponent(process.env.POSTGRES_USER))')
        DB=$${POSTGRES_DB:-daemonlogs_db}
        export DATABASE_URL="postgresql://$$USER:$$PASS@postgres:5432/$$DB"
        node dist/workers/token-validator.js

volumes:
  postgres_data:
