# docker-compose.yml — Stack unificada: frontend + backend + postgres
#
# Rede interna:
#   - browser → nginx (frontend:80) → /api/* proxied → api:3000   (interna)
#   - api → postgres:5432                                           (interna)
#   - postgres NÃO tem porta exposta externamente
#   - api    NÃO tem porta exposta externamente (acesso só pelo nginx)
#
# Como usar:
#   1. Copie .env.example → .env  e preencha as variáveis
#      (um único .env na raiz configura backend + frontend + banco)
#   2. docker compose up --build
#   3. Acesse http://<ip-da-vps> (ou a porta configurada em FRONTEND_PORT)
#
# Para VPSs separadas, use os composes individuais:
#   DaemonLogs-backend/docker-compose.yml     → só o backend + banco
#   DaemonLogs-frontend/docker-compose.prod.yml → só o frontend

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: daemonlogs-postgres
    restart: unless-stopped
    # Lê POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB do .env da raiz
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sem porta externa — apenas a rede interna do compose
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-daemonlogs} -d ${POSTGRES_DB:-daemonlogs_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Fastify + Prisma) ────────────────────────────────────────────
  api:
    build:
      context: ./DaemonLogs-backend
    container_name: daemonlogs-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      SWAGGER_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    # Sem porta externa — o nginx acessa via rede interna (api:3000)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${PORT:-3000}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    # DATABASE_URL é construído em runtime usando node para URL-encodar a senha,
    # evitando quebra de parsing com caracteres especiais (@, #, !, etc.)
    command:
      - sh
      - -c
      - |
        PASS=$$(node -e 'process.stdout.write(encodeURIComponent(process.env.POSTGRES_PASSWORD))')
        USER=$$(node -e 'process.stdout.write(encodeURIComponent(process.env.POSTGRES_USER))')
        DB=$${POSTGRES_DB:-daemonlogs_db}
        export DATABASE_URL="postgresql://$$USER:$$PASS@postgres:5432/$$DB"
        npx prisma migrate deploy
        node dist/server.js

  # ── Frontend (Vite build → nginx com proxy reverso) ───────────────────────
  frontend:
    build:
      context: ./DaemonLogs-frontend
      target: prod
      args:
        # VITE_API_URL: /api — rota relativa; o nginx deste container faz o proxy
        # de /api/* → api:3000/* (rede interna do compose). Não alterar.
        VITE_API_URL: /api
        # VITE_AUTH_MODE vem do .env da raiz e deve ser igual ao AUTH_MODE do backend
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-local}
    container_name: daemonlogs-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    # Substitui o nginx.conf da imagem pelo da raiz do projeto,
    # que adiciona o proxy reverso para o serviço api
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
