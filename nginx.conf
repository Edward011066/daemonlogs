# nginx.conf — Reverse proxy unificado para a stack DaemonLogs
#
# Este arquivo substitui o nginx.conf embutido na imagem do frontend.
# Responsabilidades:
#   1. Servir os assets estáticos da SPA React (build Vite)
#   2. Proxy reverso: /api/* → http://api:3000/*  (rede interna do compose)
#      O nginx remove o prefixo /api antes de encaminhar para o backend.
#   3. Fallback para React Router (SPA — todas as rotas caem no index.html)

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Proxy reverso para a API ──────────────────────────────────────────
    # O browser envia:    GET /api/auth/login
    # O nginx encaminha:  GET /auth/login  →  http://api:3000/auth/login
    # "api" é o nome do serviço na rede interna do docker compose
    location /api/ {
        proxy_pass         http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Suporte a streaming / SSE se necessário
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }

    # ── SPA fallback (React Router) ───────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome (Vite os gera assim)
    location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sem cache para index.html (ponto de entrada sempre atualizado)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
