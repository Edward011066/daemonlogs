server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Fallback para SPA (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets com hash no nome (Vite os gera assim)
    location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sem cache para index.html (ponto de entrada sempre atualizado)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
