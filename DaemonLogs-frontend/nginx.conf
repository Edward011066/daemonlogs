server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão gzip para assets estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Fallback para SPA (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para Swagger do backend (apenas em ambientes que expõem api-docs)
    # Configure BACKEND_URL no seu proxy reverso externo, ou ajuste o endereço abaixo.
    # Exemplo: se o backend está em http://backend:3000, descomente as linhas abaixo:
    # location /api-docs {
    #     proxy_pass http://backend:3000/api-docs;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Cache longo para assets com hash no nome (Vite os gera assim)
    location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Sem cache para index.html (ponto de entrada sempre atualizado)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
